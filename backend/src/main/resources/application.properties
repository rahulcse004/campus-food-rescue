spring.application.name=backend

# ===== MySQL =====
# Update username/password to match your local MySQL setup.
# This will auto-create the database if it doesn't exist (createDatabaseIfNotExist=true)
spring.datasource.url=jdbc:mysql://localhost:3306/campus_food_rescue?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=jackson
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# update = auto-creates/updates tables based on entities. Good for development.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ===== Server =====
server.port=8080

# ===== CORS handled in WebConfig.java (allows Vite dev server on 5173) =====
